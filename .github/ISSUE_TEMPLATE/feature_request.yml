name: Feature request
description: Suggest an improvement or new capability
type: Feature
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: "Describe the job-to-be-done."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: "Describe the behavior / UX."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you’ve considered
      placeholder: "Workarounds or other approaches."
  - type: textarea
    id: context
    attributes:
      label: Extra context
      placeholder: "Mockups, examples, links, etc."
